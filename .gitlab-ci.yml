# ═══════════════════════════ STAGE: DEPLOY INFRA ══════════════════════════

terraform-plan:
  <<: *terraform_template
  stage: deploy-infra
  script:
    - apk add --no-cache aws-cli bash
    - |
      # Import existing ECR repos into Terraform state (avoids RepositoryAlreadyExistsException)
      SERVICES="api-gateway auth-service user-service feed-service jobs-service events-service research-service messaging-service notification-service analytics-service"
      for svc in $SERVICES; do
        REPO="${PROJECT_NAME}/${svc}"
        # Check if already in state
        if ! terraform state show "module.ecr.aws_ecr_repository.services[\"${svc}\"]" >/dev/null 2>&1; then
          # Check if repo exists in ECR
          if aws ecr describe-repositories --repository-names "$REPO" --region "$AWS_DEFAULT_REGION" >/dev/null 2>&1; then
            echo "Importing existing ECR repo: $REPO"
            terraform import \
              -var="project_name=${PROJECT_NAME}" \
              -var="environment=${ENVIRONMENT}" \
              -var="aws_region=${AWS_DEFAULT_REGION}" \
              -var="db_username=${DB_USERNAME}" \
              -var="db_password=${DB_PASSWORD}" \
              -var="jwt_secret=${JWT_SECRET}" \
              -var="jwt_refresh_secret=${JWT_REFRESH_SECRET}" \
              "module.ecr.aws_ecr_repository.services[\"${svc}\"]" "$REPO" || true
          fi
        fi
      done
    - |
      terraform plan \
        -var="project_name=${PROJECT_NAME}" \
        -var="environment=${ENVIRONMENT}" \
        -var="aws_region=${AWS_DEFAULT_REGION}" \
        -var="db_username=${DB_USERNAME}" \
        -var="db_password=${DB_PASSWORD}" \
        -var="jwt_secret=${JWT_SECRET}" \
        -var="jwt_refresh_secret=${JWT_REFRESH_SECRET}" \
        -out=tfplan
  artifacts:
    paths:
      - ${TF_DIR}/tfplan
    expire_in: 1 hour
  rules:
    - changes:
        - terraform/**/*
    - if: $DEPLOY_ALL == "true"

terraform-apply:
  <<: *terraform_template
  stage: deploy-infra
  script:
    - terraform apply -auto-approve tfplan
  needs:
    - terraform-plan
  when: manual
  rules:
    - changes:
        - terraform/**/*
    - if: $DEPLOY_ALL == "true"

# ═══════════════════════════ STAGE: DEPLOY SERVICES ═══════════════════════

deploy-ecs-services:
  image: amazon/aws-cli:2.15
  stage: deploy-services
  script:
    - |
      SERVICES="api-gateway auth-service user-service feed-service jobs-service events-service research-service messaging-service notification-service analytics-service"
      CLUSTER="${PROJECT_NAME}-cluster"
      for svc in $SERVICES; do
        echo "=== Redeploying $svc ==="
        aws ecs update-service \
          --cluster "$CLUSTER" \
          --service "$svc" \
          --force-new-deployment \
          --region "$AWS_DEFAULT_REGION" || echo "WARN: $svc not found, skipping"
      done
    - |
      echo "Waiting for api-gateway to stabilize..."
      aws ecs wait services-stable \
        --cluster "$CLUSTER" \
        --services "api-gateway" \
        --region "$AWS_DEFAULT_REGION" || true
      echo "Deployment complete."
  rules:
    - if: $CI_COMMIT_BRANCH == "deploy"
    - if: $DEPLOY_ALL == "true"

# ═══════════════════════════ STAGE: DEPLOY FRONTEND ═══════════════════════

deploy-frontend:
  image: node:20-alpine
  stage: deploy-frontend
  before_script:
    - apk add --no-cache aws-cli
  script:
    - cd "${CI_PROJECT_DIR}/${FRONTEND_DIR}"
    # Dynamically discover the ALB DNS to use as API URL
    - |
      ALB_DNS=$(aws elbv2 describe-load-balancers \
        --names "${PROJECT_NAME}-alb" \
        --query "LoadBalancers[0].DNSName" \
        --output text \
        --region "$AWS_DEFAULT_REGION" 2>/dev/null || echo "localhost")
      echo "VITE_API_URL=http://${ALB_DNS}/api/v1" > .env.production
      echo "Frontend will point to: http://${ALB_DNS}/api/v1"
    - npm ci
    - npm run build
    - |
      BUCKET="${PROJECT_NAME}-frontend-${ENVIRONMENT}"
      aws s3 sync dist/ "s3://${BUCKET}" --delete --region "$AWS_DEFAULT_REGION"
      echo "Frontend deployed to s3://${BUCKET}"
  rules:
    - changes:
        - "code/Mini Project/decp-platform/frontend/**/*"
    - if: $DEPLOY_ALL == "true"
