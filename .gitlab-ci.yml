###############################################################################
# GitLab CI/CD Pipeline for DECP Platform
# - Validates & deploys Terraform infrastructure
# - Builds & pushes Docker images to ECR
# - Deploys ECS services & frontend to S3
###############################################################################

stages:
  - validate
  - build
  - deploy-infra
  - deploy-services
  - deploy-frontend

variables:
  AWS_DEFAULT_REGION: "us-east-1"
  TF_DIR: "terraform"
  BACKEND_DIR: "code/Mini Project/decp-platform/backend"
  FRONTEND_DIR: "code/Mini Project/decp-platform/frontend"
  PROJECT_NAME: "decp-platform"
  ENVIRONMENT: "dev"
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  VITE_API_URL: "http://decp-platform-alb-440905668.us-east-1.elb.amazonaws.com/api/v1"

# ─────────────────────────── Reusable templates ───────────────────────────

.terraform_template: &terraform_template
  image:
    name: hashicorp/terraform:1.7
    entrypoint: ["/bin/sh", "-c"]
  before_script:
    - cd $TF_DIR
    - |
      terraform init \
        -backend-config="bucket=${TF_STATE_BUCKET}" \
        -backend-config="key=${PROJECT_NAME}/${ENVIRONMENT}/terraform.tfstate" \
        -backend-config="region=${AWS_DEFAULT_REGION}" \
        -backend-config="dynamodb_table=${TF_LOCK_TABLE}"

.docker_template: &docker_template
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache aws-cli bash
    - |
      aws ecr get-login-password --region $AWS_DEFAULT_REGION | \
        docker login --username AWS --password-stdin \
        "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"

# ═══════════════════════════ STAGE: VALIDATE ══════════════════════════════

terraform-validate:
  <<: *terraform_template
  stage: validate
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - changes:
        - terraform/**/*
    - if: $DEPLOY_ALL == "true"

# ═══════════════════════════ STAGE: BUILD ═════════════════════════════════
# Builds only changed services, or all when DEPLOY_ALL=true

.build_service:
  <<: *docker_template
  stage: build
  script:
    - |
      REPO_NAME="${PROJECT_NAME}/${SERVICE_NAME}"
      IMAGE_TAG="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${REPO_NAME}:${CI_COMMIT_SHORT_SHA}"
      IMAGE_LATEST="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${REPO_NAME}:latest"

      # Ensure ECR repository exists before pushing
      aws ecr describe-repositories --repository-names "$REPO_NAME" --region "$AWS_DEFAULT_REGION" 2>/dev/null || \
        aws ecr create-repository --repository-name "$REPO_NAME" --region "$AWS_DEFAULT_REGION"

      echo "Building ${SERVICE_NAME}..."
      docker build -t "$IMAGE_TAG" -t "$IMAGE_LATEST" "${CI_PROJECT_DIR}/${BACKEND_DIR}/${SERVICE_NAME}"
      docker push "$IMAGE_TAG"
      docker push "$IMAGE_LATEST"
      echo "✓ ${SERVICE_NAME} pushed successfully"

build-api-gateway:
  extends: .build_service
  variables:
    SERVICE_NAME: api-gateway
  rules:
    - changes:
        - "code/Mini Project/decp-platform/backend/api-gateway/**/*"
    - if: $DEPLOY_ALL == "true"

