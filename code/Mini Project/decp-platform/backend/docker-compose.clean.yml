# Clean Docker Compose - Complete fresh start
version: '3.8'

services:
  # PostgreSQL Database - Fresh instance
  postgres:
    image: postgres:16-alpine
    container_name: decp-postgres-clean
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    networks:
      - decp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis
  redis:
    image: redis:7-alpine
    container_name: decp-redis-clean
    ports:
      - "6379:6379"
    networks:
      - decp-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: decp-rabbitmq-clean
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - decp-network

networks:
  decp-network:
    driver: bridge
