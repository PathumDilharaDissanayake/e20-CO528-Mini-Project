  # ── Events ───────────────────────────────────────────────────────────────────

  /events:
    get:
      tags: [Events]
      summary: List events
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: eventType
          in: query
          schema:
            type: string
            enum: [webinar, workshop, networking, career_fair, seminar, other]
        - name: upcoming
          in: query
          schema:
            type: boolean
          description: Filter to future events only
      responses:
        '200':
          description: Events list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Events]
      summary: Create a new event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, eventType, startDate, endDate]
              properties:
                title:
                  type: string
                description:
                  type: string
                eventType:
                  type: string
                  enum: [webinar, workshop, networking, career_fair, seminar, other]
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                location:
                  type: string
                isVirtual:
                  type: boolean
                  default: false
                meetingUrl:
                  type: string
                  format: uri
                capacity:
                  type: integer
                  minimum: 1
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/Event'
        '401':
          description: Not authenticated

  /events/my-rsvps:
    get:
      tags: [Events]
      summary: Get current user's RSVPs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User's RSVP list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        eventId:
                          type: string
                          format: uuid
                        status:
                          type: string
                          enum: [going, maybe, not_going]
                        event:
                          $ref: '#/components/schemas/Event'

  /events/{eventId}:
    get:
      tags: [Events]
      summary: Get event details
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/Event'
        '404':
          description: Event not found
    put:
      tags: [Events]
      summary: Update an event (organiser only)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: Event updated
        '403':
          description: Not the event organiser
        '404':
          description: Event not found
    delete:
      tags: [Events]
      summary: Delete an event (organiser or admin)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event deleted
        '403':
          description: Not authorised

  /events/{eventId}/rsvp:
    post:
      tags: [Events]
      summary: RSVP to an event (upsert — idempotent)
      security:
        - bearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [going, maybe, not_going]
      responses:
        '200':
          description: RSVP updated (existing record)
        '201':
          description: RSVP created
        '400':
          description: Event is at capacity
        '404':
          description: Event not found

  # ── Research ─────────────────────────────────────────────────────────────────

  /research:
    get:
      tags: [Research]
      summary: List research projects
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 50
        - name: status
          in: query
          schema:
            type: string
            enum: [active, completed, paused, recruiting]
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tags to filter by
      responses:
        '200':
          description: Research projects list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      description: ResearchProject
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Research]
      summary: Create a research project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, abstract]
              properties:
                title:
                  type: string
                abstract:
                  type: string
                status:
                  type: string
                  enum: [active, completed, paused, recruiting]
                  default: active
                tags:
                  type: array
                  items:
                    type: string
                collaborators:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        '201':
          description: Research project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      project:
                        type: object

  /research/{projectId}:
    get:
      tags: [Research]
      summary: Get a research project by ID
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project details
        '404':
          description: Project not found
    put:
      tags: [Research]
      summary: Update a research project (lead researcher only)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                abstract:
                  type: string
                status:
                  type: string
                  enum: [active, completed, paused, recruiting]
      responses:
        '200':
          description: Project updated
        '403':
          description: Not the lead researcher
        '404':
          description: Project not found
    delete:
      tags: [Research]
      summary: Delete a research project (lead researcher only)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project deleted
        '403':
          description: Not the lead researcher

  /research/{projectId}/collaborate:
    post:
      tags: [Research]
      summary: Join a research project as collaborator
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Joined as collaborator (duplicate join is idempotent via Set dedup)
        '404':
          description: Project not found
    delete:
      tags: [Research]
      summary: Leave a research project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Left the project
        '400':
          description: Lead researcher cannot leave the project
        '404':
          description: Project not found

  /research/{projectId}/documents:
    post:
      tags: [Research]
      summary: Upload a document to a research project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [document]
              properties:
                document:
                  type: string
                  format: binary
                  description: PDF, DOCX, or image (magic-byte validated, max 50 MB)
                title:
                  type: string
      responses:
        '201':
          description: Document uploaded
        '400':
          description: Unsupported file type or size exceeded
        '403':
          description: Not the lead researcher or a collaborator

  /research/{projectId}/documents/{documentId}:
    delete:
      tags: [Research]
      summary: Remove a document from a research project
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document removed
        '403':
          description: Not authorised
        '404':
          description: Document not found

  # ── Messaging ────────────────────────────────────────────────────────────────

  /messaging:
    get:
      tags: [Messaging]
      summary: Get current user's conversations
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Conversations list (ordered by last message time)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        type:
                          type: string
                          enum: [direct, group]
                        name:
                          type: string
                          nullable: true
                        participants:
                          type: array
                          items:
                            type: string
                            format: uuid
                        lastMessage:
                          type: string
                          nullable: true
                        updatedAt:
                          type: string
                          format: date-time
    post:
      tags: [Messaging]
      summary: Create a conversation
      description: |
        For `direct` type between two users, returns the existing conversation if one already exists
        (idempotent — safe to call multiple times).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, participants]
              properties:
                type:
                  type: string
                  enum: [direct, group]
                participants:
                  type: array
                  items:
                    type: string
                    format: uuid
                  description: User IDs to include (creator is added automatically)
                name:
                  type: string
                  description: Required for group conversations
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      conversation:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          type:
                            type: string
                          participants:
                            type: array
                            items:
                              type: string

  /messaging/{conversationId}:
    get:
      tags: [Messaging]
      summary: Get conversation details (participants only)
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Conversation details
        '403':
          description: Not a participant in this conversation
        '404':
          description: Conversation not found

  /messaging/{conversationId}/messages:
    get:
      tags: [Messaging]
      summary: Get messages in a conversation (participants only)
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Messages list (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        conversationId:
                          type: string
                          format: uuid
                        senderId:
                          type: string
                          format: uuid
                        content:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
        '403':
          description: Not a participant
    post:
      tags: [Messaging]
      summary: Send a message (participants only)
      security:
        - bearerAuth: []
      parameters:
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 10000
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      message:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          content:
                            type: string
                          senderId:
                            type: string
                            format: uuid
        '403':
          description: Not a participant

  # ── Analytics ─────────────────────────────────────────────────────────────────

  /analytics/track:
    post:
      tags: [Analytics]
      summary: Track a user activity event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, entityType, entityId]
              properties:
                action:
                  type: string
                  enum: [view, like, comment, share, apply, rsvp, connect, search]
                entityType:
                  type: string
                  enum: [post, job, event, research, user, profile]
                entityId:
                  type: string
                  format: uuid
                metadata:
                  type: object
                  additionalProperties: true
                  description: Optional extra context (e.g. source, referrer)
      responses:
        '201':
          description: Activity tracked
        '401':
          description: Not authenticated

  /analytics/dashboard:
    get:
      tags: [Analytics]
      summary: Get platform dashboard metrics
      security:
        - bearerAuth: []
      parameters:
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: ISO date (inclusive lower bound)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: ISO date (inclusive upper bound)
      responses:
        '200':
          description: Dashboard metrics (4 parallel aggregations)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      totalActivities:
                        type: integer
                      uniqueUsers:
                        type: integer
                      activitiesByType:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Map of action → count
                      activitiesByDay:
                        type: array
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                            count:
                              type: integer

  /analytics/users/{userId}/activity:
    get:
      tags: [Analytics]
      summary: Get activity history for a specific user
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            maximum: 100
      responses:
        '200':
          description: User activity history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      activities:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            action:
                              type: string
                            entityType:
                              type: string
                            entityId:
                              type: string
                            createdAt:
                              type: string
                              format: date-time
                      total:
                        type: integer

  /analytics/popular:
    get:
      tags: [Analytics]
      summary: Get most-interacted-with content
      security:
        - bearerAuth: []
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
            enum: [post, job, event, research, user, profile]
          description: Filter by content type
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Popular content list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        entityId:
                          type: string
                          format: uuid
                        entityType:
                          type: string
                        count:
                          type: integer
