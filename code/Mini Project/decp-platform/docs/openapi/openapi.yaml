                  type: string
                description:
                  type: string
                isActive:
                  type: boolean
      responses:
        '200':
          description: Job updated
        '403':
          description: Not the job poster
        '404':
          description: Job not found
    delete:
      tags: [Jobs]
      summary: Delete a job posting (owner only)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
