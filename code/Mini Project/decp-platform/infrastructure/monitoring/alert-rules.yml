# DECP Platform - Prometheus Alert Rules
groups:
  - name: decp-platform-alerts
    rules:
      # =====================================
      # API Gateway Alerts
      # =====================================
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="api-gateway"}[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          service: api-gateway
        annotations:
          summary: "High request latency on API Gateway"
          description: "95th percentile latency is {{ $value }}s for {{ $labels.instance }}"
          runbook_url: "https://wiki.decp.io/runbooks/high-latency"

      - alert: HighErrorRate
        expr: rate(http_requests_total{service="api-gateway",status=~"5.."}[5m]) / rate(http_requests_total{service="api-gateway"}[5m]) > 0.01
        for: 5m
        labels:
          severity: critical
          service: api-gateway
        annotations:
          summary: "High error rate on API Gateway"
          description: "Error rate is {{ $value | humanizePercentage }} for {{ $labels.instance }}"
          runbook_url: "https://wiki.decp.io/runbooks/high-error-rate"

      - alert: APIGatewayDown
        expr: up{job="decp-api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: api-gateway
        annotations:
          summary: "API Gateway is down"
          description: "API Gateway instance {{ $labels.instance }} has been down for more than 1 minute"
          runbook_url: "https://wiki.decp.io/runbooks/service-down"

      # =====================================
      # Service Health Alerts
      # =====================================
      - alert: ServiceDown
        expr: up{job=~"decp-.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Service {{ $labels.job }} on {{ $labels.instance }} has been down for more than 2 minutes"

      - alert: ServiceHighMemoryUsage
        expr: (container_memory_usage_bytes{namespace="decp-platform"} / container_spec_memory_limit_bytes{namespace="decp-platform"}) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in {{ $labels.pod }}"
          description: "Memory usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"

      - alert: ServiceHighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total{namespace="decp-platform"}[5m]) / container_spec_cpu_quota{namespace="decp-platform"}) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage in {{ $labels.pod }}"
          description: "CPU usage is {{ $value | humanizePercentage }} for pod {{ $labels.pod }}"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="decp-platform"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"
          description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently"

      # =====================================
      # Database Alerts
      # =====================================
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL instance {{ $labels.instance }} is down"

      - alert: PostgreSQLHighConnections
        expr: pg_stat_activity_count > (pg_settings_max_connections * 0.8)
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL high connection count"
          description: "PostgreSQL has {{ $value }} active connections (>80% of max)"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag > 30
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL replication lag"
          description: "PostgreSQL replication lag is {{ $value }} seconds"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_activity_max_tx_duration{datname!~"template.*"}[5m]) > 60
        for: 5m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL slow queries detected"
          description: "PostgreSQL has queries running longer than 60 seconds"

      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "Redis is down"
          description: "Redis instance {{ $labels.instance }} is down"

      - alert: RedisHighMemoryUsage
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) > 0.9
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      - alert: RedisRejectedConnections
        expr: rate(redis_rejected_connections_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis rejecting connections"
          description: "Redis is rejecting connections due to maxclients limit"

      # =====================================
      # Message Queue Alerts
      # =====================================
      - alert: RabbitMQDown
        expr: rabbitmq_up == 0
        for: 1m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "RabbitMQ is down"
          description: "RabbitMQ instance {{ $labels.instance }} is down"

      - alert: RabbitMQHighMemoryUsage
        expr: rabbitmq_process_resident_memory_bytes / rabbitmq_resident_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ high memory usage"
          description: "RabbitMQ memory usage is {{ $value | humanizePercentage }}"

      - alert: RabbitMQQueueHighMessages
        expr: rabbitmq_queue_messages > 10000
        for: 10m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ queue has many messages"
          description: "Queue {{ $labels.queue }} has {{ $value }} messages"

      - alert: RabbitMQUnackedMessages
        expr: rabbitmq_queue_messages_unacked > 1000
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ unacknowledged messages"
          description: "Queue {{ $labels.queue }} has {{ $value }} unacknowledged messages"

      # =====================================
      # Infrastructure Alerts
      # =====================================
      - alert: NodeDown
        expr: up{job="node-exporter"} == 0
        for: 5m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "Node {{ $labels.instance }} has been down for more than 5 minutes"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk usage is above 90% on {{ $labels.instance }}"

      - alert: DiskFull
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.05
        for: 1m
        labels:
          severity: critical
          service: infrastructure
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk usage is above 95% on {{ $labels.instance }}"

      - alert: HighLoad
        expr: node_load1 > 2
        for: 10m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High load on {{ $labels.instance }}"
          description: "Load average is {{ $value }} on {{ $labels.instance }}"

      # =====================================
      # Business Metrics
      # =====================================
      - alert: LowOrderRate
        expr: rate(orders_created_total[1h]) < 0.1
        for: 30m
        labels:
          severity: warning
          category: business
          metric_name: order_rate
        annotations:
          summary: "Low order rate detected"
          description: "Order creation rate has dropped significantly"
          current_value: "{{ $value }}"
          threshold: "0.1"

      - alert: HighPaymentFailureRate
        expr: rate(payments_failed_total[5m]) / rate(payments_total[5m]) > 0.1
        for: 10m
        labels:
          severity: critical
          category: business
          metric_name: payment_failure_rate
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value | humanizePercentage }}"

      - alert: NoActiveUsers
        expr: active_users == 0
        for: 5m
        labels:
          severity: warning
          category: business
          metric_name: active_users
        annotations:
          summary: "No active users detected"
          description: "There are no active users on the platform"
