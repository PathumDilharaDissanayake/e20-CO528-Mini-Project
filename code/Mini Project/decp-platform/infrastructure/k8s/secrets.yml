# DECP Platform - Kubernetes Secrets
# NOTE: In production, use external secret management (AWS Secrets Manager, Vault, etc.)
# and reference them via External Secrets Operator
---
# Database Secrets
apiVersion: v1
kind: Secret
metadata:
  name: database-secrets
  namespace: decp-platform
  labels:
    app.kubernetes.io/name: database
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://decp_admin:changeme_prod@postgres:5432/decp_platform"
  POSTGRES_USER: "decp_admin"
  POSTGRES_PASSWORD: "changeme_prod"
  POSTGRES_DB: "decp_platform"
  REDIS_URL: "redis://redis:6379"
  REDIS_PASSWORD: ""
---
