# DECP Platform - Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: decp-platform
  labels:
    name: decp-platform
    environment: production
    app.kubernetes.io/name: decp-platform
    app.kubernetes.io/component: namespace
    app.kubernetes.io/part-of: decp-platform
    app.kubernetes.io/managed-by: kubectl
---
# Resource Quota for the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: decp-platform-quota
  namespace: decp-platform
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "20"
---
# Limit Range for default resource limits
apiVersion: v1
kind: LimitRange
metadata:
  name: decp-platform-limits
  namespace: decp-platform
spec:
  limits:
    - default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "2"
        memory: "4Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
      type: Container
