# DECP Platform - Mobile App Build Workflow
name: CD - Mobile App

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'infrastructure/docker/Dockerfile.mobile'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build platform'
        required: true
        type: choice
        options:
          - android
          - ios
          - both
      build_type:
        description: 'Build type'
        required: true
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # =====================================
  # Build Android App
  # =====================================
  build-android:
    name: Build Android (${{ github.event.inputs.build_type || 'release' }})
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'both' || github.event.inputs.platform == null }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Run linting
        working-directory: ./mobile
        run: npm run lint

      - name: Run tests
        working-directory: ./mobile
        run: npm run test

      - name: Decode keystore
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > mobile/android/app/my-release-key.keystore

      - name: Build APK (Debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ./mobile
        run: |
          cd android && ./gradlew assembleDebug

      - name: Build APK (Release)
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        working-directory: ./mobile
        run: |
          cd android && ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Sign APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: mobile/android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.event.inputs.build_type || 'release' }}
          path: |
            mobile/android/app/build/outputs/apk/debug/*.apk
            mobile/android/app/build/outputs/apk/release/*.apk

      - name: Upload to Firebase App Distribution
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: mobile/android/app/build/outputs/apk/release/app-release.apk

  # =====================================
  # Build iOS App
  # =====================================
  build-ios:
    name: Build iOS (${{ github.event.inputs.build_type || 'release' }})
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Install CocoaPods
        working-directory: ./mobile/ios
        run: pod install

      - name: Build iOS (Debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: ./mobile/ios
        run: |
          xcodebuild -workspace DECPMobile.xcworkspace \
            -scheme DECPMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build

      - name: Build iOS (Release)
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        working-directory: ./mobile/ios
        run: |
          xcodebuild -workspace DECPMobile.xcworkspace \
            -scheme DECPMobile \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        run: |
          mkdir -p Payload
          cp -r mobile/ios/build/Build/Products/Release-iphoneos/DECPMobile.app Payload/
          zip -r DECPMobile.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.event.inputs.build_type || 'release' }}
          path: |
            DECPMobile.ipa

      - name: Upload to App Store Connect
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == null }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: DECPMobile.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}

  # =====================================
  # Create GitHub Release
  # =====================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk-release
          path: artifacts/android

      - name: Download iOS artifacts
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'both' }}
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa-release
          path: artifacts/ios

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Mobile App Release v${{ github.run_number }}
          body: |
            ## Mobile App Build
            - Build Date: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.sha }}
            
            ### Downloads
            - Android APK: See artifacts below
            - iOS IPA: See artifacts below (if built)
          files: |
            artifacts/android/**/*.apk
            artifacts/ios/**/*.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "📱 Mobile app build completed! Version: v${{ github.run_number }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
