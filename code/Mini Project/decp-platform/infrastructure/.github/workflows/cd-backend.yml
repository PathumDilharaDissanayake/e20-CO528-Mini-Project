# DECP Platform - Backend CD Workflow
name: CD - Backend Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'infrastructure/docker/**'
      - 'infrastructure/k8s/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - api-gateway
          - auth-service
          - user-service
          - product-service
          - order-service
          - payment-service
          - notification-service
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: decp-platform-cluster

jobs:
  # =====================================
  # Detect Changed Services
  # =====================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changes.outputs.services }}
      changed_services: ${{ steps.changes.outputs.changed_services }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed services
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.service }}" = "all" ]; then
              SERVICES='["api-gateway","auth-service","user-service","product-service","order-service","payment-service","notification-service"]'
            else
              SERVICES="[\"${{ github.event.inputs.service }}\"]"
            fi
          else
            # Get changed directories
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^services/' | cut -d'/' -f2 | sort -u | jq -R . | jq -s .)
            SERVICES=$CHANGED
          fi
          echo "services=$SERVICES" >> $GITHUB_OUTPUT
          echo "changed_services=$SERVICES" >> $GITHUB_OUTPUT
          echo "Detected services: $SERVICES"

  # =====================================
  # Build & Push Images
  # =====================================
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./infrastructure/docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/decp-platform/${{ matrix.service }}:${{ steps.version.outputs.version }}
            ${{ steps.login-ecr.outputs.registry }}/decp-platform/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: |
          echo "IMAGE_TAG=${{ steps.version.outputs.version }}" >> $GITHUB_ENV

  # =====================================
  # Deploy to Staging
  # =====================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: ${{ github.event.inputs.environment == 'staging' || github.event.inputs.environment == null }}
    environment:
      name: staging
      url: https://api-staging.decp.io
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-staging --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/decp-platform/${{ matrix.service }}:$VERSION \
            -n decp-platform-staging
          kubectl rollout status deployment/${{ matrix.service }} -n decp-platform-staging --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n decp-platform-staging -l app.kubernetes.io/name=${{ matrix.service }}

  # =====================================
  # Deploy to Production
  # =====================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: ${{ github.event.inputs.environment == 'production' }}
    environment:
      name: production
      url: https://api.decp.io
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }}-prod --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS (Canary)
        run: |
          VERSION=$(date +%Y%m%d)-$(git rev-parse --short HEAD)
          # Start canary deployment
          kubectl set image deployment/${{ matrix.service }} \
            ${{ matrix.service }}=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/decp-platform/${{ matrix.service }}:$VERSION \
            -n decp-platform
          kubectl rollout status deployment/${{ matrix.service }} -n decp-platform --timeout=600s

      - name: Run smoke tests
        run: |
          sleep 30
          curl -sf https://api.decp.io/health || exit 1

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Deployed ${{ matrix.service }} to production successfully!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/${{ matrix.service }} -n decp-platform
          echo "::error::Deployment failed, rolled back to previous version"
          exit 1
